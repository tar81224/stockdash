<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--text-dim:#8b949e;--green:#3fb950;--red:#f85149;--blue:#1f6feb;--yellow:#e3b341;--safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom)}
  html,body{height:100%;overflow:hidden;touch-action:manipulation}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
  #app{height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
  .app-header{flex-shrink:0;padding:max(12px,var(--safe-top)) 16px 12px;background:linear-gradient(180deg,#161b22 0%,#0d1117 100%);border-bottom:1px solid var(--border);z-index:100;display:flex;align-items:center;justify-content:space-between}
  .app-header h1{font-size:20px;font-weight:700;color:#f0f6fc;letter-spacing:-0.3px}
  .app-header .time{font-size:11px;color:var(--text-dim);margin-top:2px}
  .app-header .status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 12px 100px}
  .scroll-area::-webkit-scrollbar{display:none}
  .panel{display:none}
  .panel.active{display:block}
  .market-scroll{display:flex;gap:8px;padding:12px 0;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
  .market-scroll::-webkit-scrollbar{display:none}
  .market-chip{flex-shrink:0;scroll-snap-align:start;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;min-width:130px}
  .market-chip .label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px}
  .market-chip .value{font-size:18px;font-weight:700;color:#f0f6fc;margin-top:2px}
  .market-chip .change{font-size:12px;margin-top:2px;font-weight:500}
  .up{color:var(--green)}.down{color:var(--red)}.neutral{color:var(--text-dim)}
  .stock-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden}
  .stock-top{padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
  .stock-left{display:flex;align-items:center;gap:12px}
  .stock-logo{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff}
  .stock-name .ticker{font-size:16px;font-weight:700;color:#f0f6fc}
  .stock-name .sub{font-size:11px;color:var(--text-dim)}
  .stock-right{text-align:right}
  .stock-right .price{font-size:22px;font-weight:700;color:#f0f6fc}
  .stock-right .pct{font-size:13px;font-weight:600}
  .stock-chart{height:140px;padding:0 12px}
  .stock-chart canvas{width:100%;height:100%}
  .stock-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#21262d}
  .stock-metrics > div{background:var(--card);padding:10px;text-align:center}
  .stock-metrics .m-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px}
  .stock-metrics .m-value{font-size:14px;font-weight:600;color:#f0f6fc;margin-top:2px}
  .range-wrap{padding:10px 16px}
  .range-top{display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim);margin-bottom:4px}
  .range-bar{height:5px;background:#21262d;border-radius:3px;overflow:hidden}
  .range-fill{height:100%;border-radius:3px;transition:width .5s ease}
  .range-bot{display:flex;justify-content:space-between;font-size:10px;color:#6e7681;margin-top:3px}
  .stock-footer{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #21262d}
  .rec-badge{font-size:10px;padding:3px 10px;border-radius:6px;font-weight:600;text-transform:uppercase}
  .rec-strong-buy{background:rgba(35,134,54,.2);color:var(--green)}
  .rec-buy{background:rgba(47,129,247,.2);color:#58a6ff}
  .rec-hold{background:rgba(210,153,34,.2);color:var(--yellow)}
  .rec-sell{background:rgba(248,81,73,.2);color:var(--red)}
  .remove-btn{background:#da3633;color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer}
  .remove-btn:active{background:#f85149}
  .news-item{padding:14px 16px;border-bottom:1px solid #21262d;position:relative;padding-left:20px}
  .news-item:last-child{border-bottom:none}
  .news-title{font-size:14px;color:var(--text);line-height:1.45;font-weight:500}
  .news-meta{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;align-items:center}
  .news-tag{background:#21262d;padding:2px 8px;border-radius:4px;font-size:10px;color:var(--text-dim)}
  .news-src{font-size:11px;color:#6e7681}
  .news-impact{font-size:11px;font-weight:500}
  .screener-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #21262d;gap:10px;cursor:pointer}
  .screener-row:active{background:#1c2128}
  .scr-logo{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
  .scr-info{flex:1;min-width:0}
  .scr-name{font-size:14px;font-weight:600;color:#f0f6fc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .scr-sub{font-size:11px;color:var(--text-dim)}
  .scr-price{text-align:right;flex-shrink:0}
  .scr-price .p{font-size:16px;font-weight:700;color:#f0f6fc}
  .scr-price .c{font-size:12px;font-weight:500}
  .alert-row{display:flex;align-items:flex-start;padding:14px 16px;border-bottom:1px solid #21262d;gap:12px}
  .alert-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .alert-info{flex:1}
  .alert-title{font-size:14px;font-weight:500;color:#f0f6fc}
  .alert-desc{font-size:12px;color:var(--text-dim);margin-top:2px;line-height:1.4}
  .alert-time{font-size:10px;color:#6e7681;flex-shrink:0;white-space:nowrap}
  .bottom-nav{flex-shrink:0;display:flex;justify-content:space-around;align-items:center;background:linear-gradient(0deg,#161b22 0%,#0d1117 100%);border-top:1px solid var(--border);padding:8px 0 max(8px,var(--safe-bottom));position:relative;z-index:100}
  .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;background:none;border:none;color:var(--text-dim);font-size:10px;cursor:pointer;transition:color .15s}
  .nav-btn.active{color:var(--blue)}
  .nav-btn .icon{font-size:22px;line-height:1}
  .fab{position:fixed;bottom:max(80px,var(--safe-bottom,80px));right:16px;width:56px;height:56px;border-radius:50%;background:var(--blue);color:#fff;border:none;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(31,111,235,.4);z-index:99;cursor:pointer}
  .fab:active{transform:scale(.95)}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end}
  .modal.active{display:flex}
  .modal-sheet{background:var(--card);border-radius:20px 20px 0 0;padding:20px 16px max(20px,var(--safe-bottom));width:100%;transform:translateY(100%);transition:transform .3s ease}
  .modal.active .modal-sheet{transform:translateY(0)}
  .modal-handle{width:36px;height:4px;background:#484f58;border-radius:2px;margin:0 auto 16px}
  .modal-title{font-size:18px;font-weight:700;color:#f0f6fc;margin-bottom:16px}
  .modal-input{width:100%;background:#21262d;border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:#f0f6fc;font-size:16px;outline:none;margin-bottom:12px}
  .modal-input:focus{border-color:var(--blue)}
  .modal-btn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:600;cursor:pointer}
  .modal-btn:active{background:#388bfd}
  .swipe-hint{text-align:center;padding:8px;color:#6e7681;font-size:11px}
  .sent-row{display:flex;gap:8px;padding:12px 0}
  .sent-pill{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
  .sent-pill .num{font-size:20px;font-weight:700}
  .sent-pill .lab{font-size:10px;color:var(--text-dim);text-transform:uppercase;margin-top:2px}
  .refresh-btn{background:#21262d;border:1px solid var(--border);border-radius:10px;padding:10px 16px;color:var(--text);font-size:13px;display:flex;align-items:center;gap:8px;margin:12px 0;cursor:pointer;width:100%;justify-content:center}
  .refresh-btn:active{background:#1c2128}
  .refresh-btn.spinning .spin{animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty-state{text-align:center;padding:40px 20px;color:#6e7681}
  .empty-state .icon{font-size:40px;margin-bottom:10px}
</style>
</head>

  var cvs = document.getElementById(canvasId);
  if (!cvs) return;
  var ctx = cvs.getContext('2d');
  var w = cvs.width = cvs.offsetWidth;
  var h = cvs.height = cvs.offsetHeight;
  var min = Math.min.apply(Math, data);
  var max = Math.max.apply(Math, data);
  var range = max - min || 1;
  ctx.clearRect(0, 0, w, h);
  ctx.beginPath();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  for (var i = 0; i < data.length; i++) {
    var x = (i / (data.length - 1)) * w;
    var y = h - ((data[i] - min) / range) * (h - 8) - 4;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.lineTo(w, h);
  ctx.lineTo(0, h);
  ctx.closePath();
  var g = ctx.createLinearGradient(0, 0, 0, h);
  g.addColorStop(0, color + '30');
  g.addColorStop(1, color + '05');
  ctx.fillStyle = g;
  ctx.fill();
}

// ===== RENDER MARKET =====
function renderMarket() {

    {n: 'Dow', v: '52,900', c: 1.1},
    {n: 'S&P 500', v: '7,483', c: 0.0},
    {n: 'Nasdaq', v: '25,833', c: -0.8},

  ];
  var html = '';
  for (var i = 0; i < m.length; i++) {
    var x = m[i];
    var cl = x.c >= 0 ? 'up' : 'down';
    var em = x.c >= 0 ? '&#x25B2;' : '&#x25BC;';
    html += '<div class="market-chip"><div class="label">' + x.n + '</div><div class="value">' + x.v + '</div><div class="change ' + cl + '">' + em + ' ' + Math.abs(x.c) + '%</div></div>';

// ===== RENDER PORTFOLIO =====
function renderPortfolio() {
  var el = document.getElementById('portfolioCards');
  if (portfolio.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">&#x1F4C8;</div><div>Your portfolio is empty. Tap + to add stocks.</div></div>';
    return;
  }
  var html = '';
  for (var i = 0; i < portfolio.length; i++) {
    var t = portfolio[i];
    var s = stockData[t];
    if (!s) continue;
    var up = s.change_pct >= 0;
    var color = getLogoColor(t);
    var rc = getRecClass(s.recommendation);
    var rsiColor = s.rsi > 70 ? '#f85149' : s.rsi < 30 ? '#3fb950' : '#8b949e';
    var upside = ((s.target_mean - s.price) / s.price * 100).toFixed(1);
    var rangeColor = s['52w_position'] > 80 ? '#f85149' : s['52w_position'] < 20 ? '#3fb950' : '#1f6feb';

    html += '<div class="stock-card" data-ticker="' + t + '">' +
      '<div class="stock-top">' +
        '<div class="stock-left"><div class="stock-logo" style="background:' + color + '">' + t + '</div>' +
        '<div class="stock-name"><div class="ticker">' + t + '</div><div class="sub">' + s.name + '</div></div></div>' +
        '<div class="stock-right"><div class="price">$' + s.price.toFixed(2) + '</div>' +
        '<div class="pct ' + (up ? 'up' : 'down') + '">' + (up ? '+' : '') + s.change_pct + '%</div></div></div>' +
      '<div class="stock-chart"><canvas id="chart-' + t + '"></canvas></div>' +
      '<div class="stock-metrics">' +
        '<div><div class="m-label">RSI</div><div class="m-value" style="color:' + rsiColor + '">' + s.rsi + '</div></div>' +
        '<div><div class="m-label">P/E</div><div class="m-value">' + (s.pe_trailing || 'N/A') + '</div></div>' +
        '<div><div class="m-label">Target</div><div class="m-value" style="color:' + (upside > 0 ? '#3fb950' : '#f85149') + '">' + (upside > 0 ? '+' : '') + upside + '%</div></div></div>' +
      '<div class="range-wrap"><div class="range-top"><span>52W Range</span><span>' + s['52w_position'] + '%</span></div>' +
        '<div class="range-bar"><div class="range-fill" style="width:' + s['52w_position'] + '%;background:' + rangeColor + '"></div></div>' +
        '<div class="range-bot"><span>$' + s['52w_low'] + '</span><span>$' + s['52w_high'] + '</span></div></div>' +
      '<div class="stock-footer"><span class="rec-badge ' + rc + '">' + s.recommendation + '</span>' +
        '<span style="font-size:11px;color:var(--text-dim)">' + s.analyst_count + ' analysts</span>' +
        '<button class="remove-btn" data-remove="' + t + '">Remove</button></div></div>';
  }
  el.innerHTML = html;

  // Attach remove button listeners
  var removeBtns = document.querySelectorAll('.remove-btn[data-remove]');
  for (var j = 0; j < removeBtns.length; j++) {
    removeBtns[j].addEventListener('click', function(e) {
      e.stopPropagation();
      var ticker = this.getAttribute('data-remove');
      removeStock(ticker);
    });
  }

  // Draw charts after DOM update
  setTimeout(function() {
    for (var k = 0; k < portfolio.length; k++) {
      var st = stockData[portfolio[k]];
      if (st) drawChart('chart-' + portfolio[k], st.history, getLogoColor(portfolio[k]));
    }
  }, 100);
}

// ===== RENDER SCREENER =====
function renderScreener() {
  var el = document.getElementById('screenerList');
  var filterVal = document.getElementById('screenerFilter').value.toLowerCase();
  var html = '';
  for (var i = 0; i < screenerUniverse.length; i++) {
    var s = screenerUniverse[i];
    if (filterVal && !s.ticker.toLowerCase().includes(filterVal) && !s.name.toLowerCase().includes(filterVal)) continue;
    var up = s.change >= 0;
    var color = getLogoColor(s.ticker);
    html += '<div class="screener-row" data-screener-ticker="' + s.ticker + '">' +
      '<div class="scr-logo" style="background:' + color + '">' + s.ticker + '</div>' +
      '<div class="scr-info"><div class="scr-name">' + s.name + '</div>' +
      '<div class="scr-sub">' + s.sector + ' &#x00B7; P/E ' + s.pe + ' &#x00B7; RSI ' + s.rsi + '</div></div>' +
      '<div class="scr-price"><div class="p">$' + s.price.toFixed(2) + '</div>' +
      '<div class="c ' + (up ? 'up' : 'down') + '">' + (up ? '+' : '') + s.change + '%</div></div></div>';
  }
  el.innerHTML = html;

  // Attach click listeners
  var rows = document.querySelectorAll('.screener-row[data-screener-ticker]');
  for (var j = 0; j < rows.length; j++) {
    rows[j].addEventListener('click', function() {
      var ticker = this.getAttribute('data-screener-ticker');
      if (portfolio.indexOf(ticker) === -1) {
        addToPortfolio(ticker);
      }
    });
  }
}

// ===== RENDER NEWS =====
function renderNews() {
  var el = document.getElementById('newsList');
  var pos = 0, neu = 0, neg = 0;
  for (var i = 0; i < currentNews.length; i++) {
    if (currentNews[i].sentiment === 'positive') pos++;
    else if (currentNews[i].sentiment === 'neutral') neu++;
    else neg++;
  }

  document.getElementById('sentimentRow').innerHTML =
    '<div class="sent-pill"><div class="num" style="color:#3fb950">' + pos + '</div><div class="lab">Positive</div></div>' +
    '<div class="sent-pill"><div class="num" style="color:#8b949e">' + neu + '</div><div class="lab">Neutral</div></div>' +
    '<div class="sent-pill"><div class="num" style="color:#f85149">' + neg + '</div><div class="lab">Negative</div></div>' +
    '<div class="sent-pill"><div class="num" style="color:#1f6feb">' + currentNews.length + '</div><div class="lab">Total</div></div>';

  var html = '';
  for (var j = 0; j < currentNews.length; j++) {
    var n = currentNews[j];
    var sc = n.sentiment === 'positive' ? '#3fb950' : n.sentiment === 'negative' ? '#f85149' : '#8b949e';
    var tags = '';
    for (var k = 0; k < n.tickers.length; k++) {
      tags += '<span class="news-tag">' + n.tickers[k] + '</span>';
    }
    html += '<div class="news-item" style="border-left:3px solid ' + sc + '">' +
      '<div class="news-title">' + n.title + '</div>' +
      '<div class="news-meta">' + tags + '<span class="news-src">' + n.source + ' &#x00B7; ' + n.time + '</span>' +
      '<span class="news-impact" style="color:' + sc + '">' + n.impact + '</span></div></div>';
  }
  el.innerHTML = html;
}

function refreshNewsMobile() {
  var btn = document.getElementById('refreshNewsBtn');
  var spin = document.getElementById('newsSpin');
  btn.classList.add('spinning');
  btn.disabled = true;
  spin.style.animation = 'spin 1s linear infinite';
  btn.innerHTML = '<span class="spin" style="animation:spin 1s linear infinite">&#x1F504;</span> Refreshing...';

  setTimeout(function() {
    currentNews.unshift({
      title: 'Breaking: Fed Signals Potential Rate Cut in September',
      source: 'Reuters',
      time: 'Just now',
      impact: 'Bullish for growth',
      sentiment: 'positive',
      tickers: ['AAPL', 'NVDA', 'TSLA']
    });
    if (currentNews.length > 20) currentNews.pop();
    renderNews();
    btn.classList.remove('spinning');
    btn.disabled = false;
    spin.style.animation = '';
    btn.innerHTML = '<span class="spin">&#x1F504;</span> Refresh News';
  }, 1500);
}

// ===== NAVIGATION =====
function switchPanel(panelName) {
  console.log('[StockDash] Switching to panel: ' + panelName);
  currentPanel = panelName;

  var panels = document.querySelectorAll('.panel');
  for (var i = 0; i < panels.length; i++) {
    panels[i].classList.remove('active');
  }
  var target = document.getElementById('panel-' + panelName);
  if (target) target.classList.add('active');

  var navBtns = document.querySelectorAll('.nav-btn');
  for (var j = 0; j < navBtns.length; j++) {
    navBtns[j].classList.toggle('active', navBtns[j].getAttribute('data-panel') === panelName);
  }

  var fab = document.getElementById('fabBtn');
  if (fab) fab.style.display = panelName === 'portfolio' ? 'flex' : 'none';

  if (panelName === 'screener') renderScreener();
  if (panelName === 'news') renderNews();
  if (panelName === 'alerts') renderAlerts();
}

// ===== ADD STOCK =====
function openAddModal() {
  document.getElementById('addModal').classList.add('active');
  document.getElementById('addTickerInput').focus();
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('active');
}

function confirmAddStock() {
  var input = document.getElementById('addTickerInput');
  var t = input.value.toUpperCase().trim();
  if (!t) return;

  if (stockData[t] && portfolio.indexOf(t) === -1) {
    portfolio.push(t);
    renderPortfolio();
    input.value = '';
    closeAddModal();
  } else if (portfolio.indexOf(t) !== -1) {
    alert(t + ' already in portfolio');
  } else {
    alert(t + ' not available in demo. Try AAPL, NVDA, TSLA.');
  }
}

function removeStock(t) {
  var newPortfolio = [];
  for (var i = 0; i < portfolio.length; i++) {
    if (portfolio[i] !== t) newPortfolio.push(portfolio[i]);
  }
  portfolio = newPortfolio;
  renderPortfolio();
}

function addToPortfolio(t) {
  if (portfolio.indexOf(t) === -1) {
    portfolio.push(t);
    switchPanel('portfolio');
    renderPortfolio();
  }
}

// ===== EVENT LISTENERS =====
document.addEventListener('DOMContentLoaded', function() {
  console.log('[StockDash] DOM loaded, attaching event listeners...');

  // Nav buttons
  var navBtns = document.querySelectorAll('.nav-btn');
  for (var i = 0; i < navBtns.length; i++) {
    navBtns[i].addEventListener('click', function() {
      var panel = this.getAttribute('data-panel');
      switchPanel(panel);
    });
  }

  // FAB (add stock button)
  document.getElementById('fabBtn').addEventListener('click', openAddModal);

  // Modal close on backdrop click
  document.getElementById('addModal').addEventListener('click', function(e) {
    if (e.target === this) closeAddModal();
  });

  // Confirm add button
  document.getElementById('confirmAddBtn').addEventListener('click', confirmAddStock);

  // Enter key in add input
  document.getElementById('addTickerInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') confirmAddStock();
  });

  // Screener filter
  document.getElementById('screenerFilter').addEventListener('input', renderScreener);

  // Refresh news button
  document.getElementById('refreshNewsBtn').addEventListener('click', refreshNewsMobile);

  // Set header date
  document.getElementById('headerTime').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric'
  });

  // Initial render
  console.log('[StockDash] Rendering initial content...');
  renderMarket();
  renderPortfolio();
  renderNews();
  renderAlerts();

  console.log('[StockDash] App ready!');
});

// Handle window resize for charts
window.addEventListener('resize', function() {
  for (var i = 0; i < portfolio.length; i++) {
    var s = stockData[portfolio[i]];
    if (s) drawChart('chart-' + portfolio[i], s.history, getLogoColor(portfolio[i]));
  }
});
</script>
